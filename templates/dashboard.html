<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BookHub | Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
</head>
<body>
    <div class="dashboard-shell">
        <aside class="sidebar card">
            <div>
                <div class="badge">BookHub</div>
                <h2>Welcome, {{ username }}!</h2>
                <p class="muted">A focused place to manage your books.</p>
            </div>

            <nav class="sidebar-nav">
                <button class="nav-link" id="dashboard-btn">Dashboard</button>
                <button class="nav-link" id="books-btn">Books</button>
                <button class="nav-link" id="shelves-btn">Shelves</button>
            </nav>

            <button id="logout-btn" class="btn-secondary full-width">Logout</button>
        </aside>

        <main class="dashboard-main">
            <header class="topbar card">
                <div>
                    <h1>Reading Dashboard</h1>
                    
                </div>
                <div class="topbar-actions">
                    <input id="search-input" type="text" placeholder="Search books..." />
                    <button class="btn-primary">Search</button>
                </div>
            </header>

            <div id="books-list">
                <!-- Book cards will be dynamically inserted here -->
            </div>

            <section class="stats-grid">
                <article class="stat-card card">
                    <span class="stat-label">Total Books</span>
                    <strong id="stat-total">0</strong>
                </article>
                <article class="stat-card card">
                    <span class="stat-label">Currently Reading</span>
                    <strong id="stat-reading">0</strong>
                </article>
                <article class="stat-card card">
                    <span class="stat-label">Completed</span>
                    <strong id="stat-read">0</strong>
                </article>
                <article class="stat-card card">
                    <span class="stat-label">Want to Read</span>
                    <strong id="stat-want">0</strong>
                </article>
            </section>

            <section class="content-grid">
                <section class="card panel">
                    <div class="panel-header">
                        <h2>Add Books!</h2>
                        <p class="muted">Enter the details of the books you want to add</p>
                    </div>

                    <form id="add-book-form" class="form-grid">
                        <input name="title" type="text" placeholder="Title" required />
                        <input name="author" type="text" placeholder="Author" required />
                        <input name="year" type="number" placeholder="Year" required />
                        <select name="status">
                            <option value="want_to_read">Want to Read</option>
                            <option value="currently_reading">Currently Reading</option>
                            <option value="read">Read</option>
                        </select>
                        <input name="pages_total" type="number" placeholder="Total pages" />
                        <input name="pages_read" type="number" placeholder="Pages read" />
                        <input name="rating" type="number" min="1" max="5" placeholder="Rating (1-5)" />
                        <textarea name="review" rows="4" placeholder="Write a short review"></textarea>
                        <button type="submit" class="btn-primary">Add Book</button>
                    </form>
                </section>

                <section class="card panel">
                    <div class="panel-header">
                        <h2>Create a Shelf!</h2>
                        <p class="muted">Create and manage custom shelves!</p>
                    </div>

                    <form id="create-shelf-form" class="inline-form">
                        <input name="name" type="text" placeholder="New shelf name" required />
                        <button type="submit" class="btn-primary">Create</button>
                    </form>

                    <ul id="shelves-list" class="simple-list"></ul>
                </section>
            </section>
        </main>
    </div>


<script src="{{ url_for('static', filename='dashboard.js') }}" defer></script>
</body>
</html>
