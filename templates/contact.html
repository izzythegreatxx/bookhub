<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | BookHub</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <header class="topbar card">
        <h1>Contact</h1>
        <a href="{{ url_for('dashboard') }}" class="btn-secondary">Back to Dashboard</a>
    </header>

    <main class="dashboard-main">
        <p class="muted">Fill out the form below to send me a message:</p>

        <form id="contact-form" method="POST" action="{{ url_for('contact') }}">
            <label for="name">Name</label>
            <input id="name" name="name" type="text" required>

            <label for="email">Email</label>
            <input id="email" name="email" type="email" required>

            <label for="message">Message</label>
            <textarea id="message" name="message" rows="5" required></textarea>

            <button type="submit" class="btn-primary">Send</button>
        </form>

        {% if message_text %}
            <p class="success">{{ message }}</p>
        {% endif %}
    </main>

    <footer class="footer card">
        <p>© 2026 Jose Islava | <a href="{{ url_for('contact') }}">Contact</a> | <a href="https://github.com/izzythegreatxx/bookhub" target="_blank">GitHub</a> | <a href="https://joseislava.com" target="_blank">Personal Site</a></p>
    </footer>
</body>
</html>
